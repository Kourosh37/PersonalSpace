name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: space_test
          POSTGRES_USER: space
          POSTGRES_PASSWORD: space
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U space -d space_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Go vet
        run: go vet ./...
      - name: Go test
        env:
          INTEGRATION_DB_DSN: postgres://space:space@127.0.0.1:5432/space_test?sslmode=disable
          SPACE_TEST_ALLOW_DB_RESET: "1"
        run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Frontend E2E smoke tests
        run: npm run test:e2e

  migrations-and-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t space-app:ci .
      - name: Compose startup smoke
        run: docker compose up -d postgres redis
      - name: Run migrations
        run: docker compose run --rm app /app/bin/migrate up
      - name: Teardown
        if: always()
        run: docker compose down -v
