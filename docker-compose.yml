services:
  app:
    image: space-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      - REDIS_ADDR=${REDIS_ADDR}
      - APP_NAME=${APP_NAME}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - BACKEND_HTTP_ADDR=${BACKEND_HTTP_ADDR}
      - BACKEND_SESSION_COOKIE_NAME=${BACKEND_SESSION_COOKIE_NAME}
      - BACKEND_SESSION_TTL_HOURS=${BACKEND_SESSION_TTL_HOURS}
      - BACKEND_SESSION_SECURE=${BACKEND_SESSION_SECURE}
      - BACKEND_SESSION_SAME_SITE=${BACKEND_SESSION_SAME_SITE:-lax}
      - BACKEND_ENFORCE_SECURE_COOKIES=${BACKEND_ENFORCE_SECURE_COOKIES:-true}
      - BACKEND_CSRF_DISABLED=${BACKEND_CSRF_DISABLED}
      - BACKEND_STORAGE_ROOT=${BACKEND_STORAGE_ROOT}
      - BACKEND_ALLOWED_ORIGINS=${BACKEND_ALLOWED_ORIGINS:-}
      - SECURITY_LOGIN_RATE_LIMIT_PER_MINUTE=${SECURITY_LOGIN_RATE_LIMIT_PER_MINUTE:-15}
      - SECURITY_SHARE_PASSWORD_RATE_LIMIT_PER_MINUTE=${SECURITY_SHARE_PASSWORD_RATE_LIMIT_PER_MINUTE:-20}
      - SECURITY_UPLOAD_INIT_RATE_LIMIT_PER_MINUTE=${SECURITY_UPLOAD_INIT_RATE_LIMIT_PER_MINUTE:-60}
      - SECURITY_UPLOAD_COMPLETE_RATE_LIMIT_PER_MINUTE=${SECURITY_UPLOAD_COMPLETE_RATE_LIMIT_PER_MINUTE:-60}
      - SECURITY_TUS_CREATE_RATE_LIMIT_PER_MINUTE=${SECURITY_TUS_CREATE_RATE_LIMIT_PER_MINUTE:-60}
      - SECURITY_PREVIEW_JOB_RATE_LIMIT_PER_MINUTE=${SECURITY_PREVIEW_JOB_RATE_LIMIT_PER_MINUTE:-30}
      - SECURITY_ZIP_DOWNLOAD_RATE_LIMIT_PER_MINUTE=${SECURITY_ZIP_DOWNLOAD_RATE_LIMIT_PER_MINUTE:-20}
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - space_storage:/data/storage
    ports:
      - "${SPACE_APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O - http://127.0.0.1:3000/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  preview-worker:
    image: space-app:latest
    entrypoint: ["/app/bin/preview-worker"]
    env_file:
      - .env
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      - APP_NAME=${APP_NAME}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - BACKEND_STORAGE_ROOT=${BACKEND_STORAGE_ROOT}
      - PREVIEW_WORKER_POLL_INTERVAL_SECONDS=${PREVIEW_WORKER_POLL_INTERVAL_SECONDS:-3}
      - PREVIEW_WORKER_MAX_ATTEMPTS=${PREVIEW_WORKER_MAX_ATTEMPTS:-3}
    volumes:
      - space_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - space_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  space_postgres:
  space_storage:
