services:
  caddy:
    image: caddy:2.9-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

  frontend:
    image: space-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: space-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      - REDIS_ADDR=${REDIS_ADDR}
      - APP_NAME=${APP_NAME}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - BACKEND_HTTP_ADDR=${BACKEND_HTTP_ADDR}
      - BACKEND_SESSION_COOKIE_NAME=${BACKEND_SESSION_COOKIE_NAME}
      - BACKEND_SESSION_TTL_HOURS=${BACKEND_SESSION_TTL_HOURS}
      - BACKEND_SESSION_SECURE=${BACKEND_SESSION_SECURE}
      - BACKEND_STORAGE_ROOT=${BACKEND_STORAGE_ROOT}
    volumes:
      - space_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - space_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  space_postgres:
  space_storage:
